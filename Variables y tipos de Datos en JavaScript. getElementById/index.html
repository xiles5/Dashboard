
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style type="text/tailwindcss">
@import "tailwindcss";

@layer base {

  body {
    @apply min-h-screen bg-cyan-900  text-white p-4 md:p-8;
  }

  form {
    @apply w-full md:w-3/4 bg-gray-100 text-black mx-auto p-6 rounded-2xl shadow-2xl;
  }

  h1 {
    @apply text-3xl font-bold text-orange-600 text-center mb-6;
  }

  p {
    @apply text-base mb-3;
  }

  strong {
    @apply text-black;
  }

  fieldset {
    @apply border-2 border-orange-600 rounded-xl p-5 mt-6;
  }

  legend {
    @apply bg-orange-600 text-white px-4 py-1 rounded-md;
  }

  label {
    @apply w-32 text-right font-semibold;
  }

  input {
    @apply border border-gray-400 rounded-md p-2 w-full md:w-64 text-black;
  }

  button {
    @apply bg-orange-600 hover:bg-orange-700 text-white px-6 py-3 rounded-xl mt-6 transition shadow-lg;
  }

}

@layer components {

  .fila {
    @apply flex flex-col md:flex-row items-center gap-3 mb-4;
  }

}

</style>

</head>

<body>

<form>

<h1>Gastos de la casa</h1>

<p>
<strong>
Todo lo que viene del HTML es un string (texto) y hay que convertirlo
</strong>
</p>
<div class="flex justify-center ">
<div class="fila">

<label for="name">Tu Nombre:</label>

<input type="text" id="name" placeholder="Escribe tu nombre de pila">

</div>

<div class="fila">

<label for="lastName">Apellido(s):</label>

<input type="text" id="lastName" placeholder="Indica tu(s) apellido(s)">

</div>
</div>
<fieldset>

<legend>Gastos fijos</legend>

<div class="fila flex">

<label class="flex-2" for="internet">Internet:</label>

<input class="flex-3" type="number" id="internet">

</div>

<div class="fila flex">

<label class="flex-2" for="luz">Luz:</label>

<input class="flex-3" type="number" id="luz">

</div>

<div class="fila flex">

<label class="flex-2" for="agua">Agua:</label>

<input class="flex-3" type="number" id="agua">

</div>

<div class="fila flex">

<label class="flex-2" for="gas">Gas:</label>

<input class="flex-3" type="number" id="gas">

</div>

<div class="fila flex">

<label class="flex-2" for="alquiler">Alquiler:</label>

<input class="flex-3" type="number" id="alquiler">

</div>

</fieldset>

<button type="button" onclick="calcular()">
Calcular gastos
</button>

<p id="totalmes"></p>

</form>

<script src="javascript.js"></script>

</body>
</html>
