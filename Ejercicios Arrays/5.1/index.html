<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5.1
    </title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="mx-auto w-6/12 text-center bg-cyan-900 mt-40 text-white">
    <div class="bg-black p-10 rounded-3xl">
    <p>
        <label for="meses">Coloca un numero del mes:</label>
        <input class="border " type="number" min="1" max="12" id="meses">
    </p>
    <button class="border bg-blue-500 text-white p-3 mt-4" type="button" onclick="resultado()">Resultado</button>
<p id="resulta"></p>
</div>
<script>
const MESES = document.getElementById("meses");
const RESULTA = document.getElementById("resulta");
const arraymes = [
 null,
  "enero",
  "febrero",
  "marzo",
  "abril",
  "mayo",
  "junio",
  "julio",
  "agosto",
  "septiembre",
  "octubre",
  "noviembre",
  "diciembre",
]

function resultado(){
   let meses = parseInt(MESES.value);
   
      
 RESULTA.innerHTML =  arraymes[meses];

    
}
</script>


</body>
</html>
