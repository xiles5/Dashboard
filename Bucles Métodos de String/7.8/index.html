<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7.8</title>
       <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style type="text/tailwindcss">
@import "tailwindcss";

@layer base {

  body{
    @apply min-h-screen bg-cyan-900 flex items-center justify-center p-4;
  }

  button{
    @apply bg-blue-500 hover:bg-blue-600 transition
    text-white px-6 py-3 rounded-xl shadow-lg
    text-lg font-bold;
  }

  p{
    @apply text-white text-base md:text-lg break-words;
  }

}

@layer components {

  .card{
    @apply bg-black w-full max-w-2xl
    rounded-3xl p-6 md:p-10
    shadow-2xl text-center;
  }

  .titulo{
    @apply text-3xl md:text-5xl
    font-bold text-white mb-6;
  }

  .resultado-box{
    @apply mt-6 bg-cyan-950 border border-cyan-700
    rounded-2xl p-4 max-h-72 overflow-y-auto;
  }

}
</style>
</head>
<body>
     <div class="bg-black text-white p-30 rounded-md">
    <label for="muestra">Introduce una  oracion:</label>
    <input type="text" class="border"  required id="muestra" >
      <button type="button" class="m-4" onclick="alreves()">RESULTADO</button>
    
<div class="resultado-box">
<p id="resultado"></p>
</div>
<script>
 const   MUESTRA = document.getElementById("muestra");
const RESULTADO = document.getElementById("resultado");

function alreves(){

let muestra = MUESTRA.value.toLowerCase();

let limpia = muestra.replaceAll(" ", "");

let atras = "";

for(let i = limpia.length - 1; i >= 0; i--){

    atras += limpia.charAt(i);

}

if(limpia === atras){

    RESULTADO.innerHTML =
    '"' + muestra + '"' + " es palíndromo";

}else{

    RESULTADO.innerHTML =
    '"' + muestra + '"' + " no es palíndromo";
}

}
</script>
</body>
</html>
