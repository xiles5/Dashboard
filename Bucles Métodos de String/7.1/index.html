<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7.1</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
@import "tailwindcss";

@layer base {

  body {
    @apply min-h-screen bg-cyan-900 text-white flex justify-center items-center px-4 py-8;
  }

  input {
    @apply border m-6 border-white/30 bg-white text-black p-3 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-blue-400;
  }

  button {
    @apply m-6 bg-blue-500 hover:bg-blue-600 text-white font-bold px-6 py-3 rounded-lg shadow-md transition duration-300 w-full sm:w-auto;
  }

  p {
    @apply text-white text-base md:text-lg break-words mt-6 text-center;
  }
}

@layer components {

  .contenedor {
    @apply bg-black w-full max-w-2xl rounded-3xl p-6 sm:p-10 shadow-2xl flex flex-col gap-5;
  }

  .grupo-inputs {
    @apply flex flex-col md:flex-row gap-4 w-full;
  }

  .input-box {
    @apply flex-1;
  }

  .btn-box {
    @apply flex justify-center mt-2;
  }
}

@layer utilities {

  .rotate-45-extra {
    transform: rotate(45deg);
  }

}
</style>
</head>
<body>
    <div class="bg-black p-28 rounded-md">
      <h1 class="text-2xl md:text-4xl font-bold text-center text-white mb-8 leading-tight ">La suma consecutiva del primer numero mas el segundo</h1>
    <label for="numero1"></label>
    <input type="number" id="numero1" placeholder="introduce un numero">
    <label for="numero2"></label>
    <input type="number" id="numero2" placeholder="introduce otro numero">

    <button type="button" onclick="sumacon()">RESULTADO</button>
    <p id="resultado"></p>
    </div>
    <script>
const NUMERO1 = document.getElementById("numero1");
const NUMERO2 = document.getElementById("numero2");
const RESULTADO = document.getElementById("resultado");

function sumacon(){

    let numero1 = parseInt(NUMERO1.value);
    let numero2 = parseInt(NUMERO2.value);

    let suma = 0;

    let operacion = "";

    for(let i = numero1; i <= numero2; i++){

        suma += i;

        operacion += i;

        if(i < numero2){
            operacion += " + ";
        }
    }

    RESULTADO.innerHTML =
    operacion + " = " + suma;
}

    </script>
</body>
</html>
