
<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
  </script>

  <style type="text/tailwindcss">
    @import "tailwindcss"; 

    @layer base {
      p {
        @apply mb-2 text-white
      }

      button {
        @apply rounded-md bg-blue-500 border-1 border-slate-400 px-4 py-1 my-1 text-sm cursor-pointer disabled:opacity-50
      }
      details {
        @apply mb-4 pb-4 border-b-slate-700 border-b-1 text-white text-xs italic font-serif
      }
      summary {
        @apply text-2xl 
      }

      ol {
        @apply list-decimal list-inside ml-6 mb-4
      }
      kbd, code, a {
        @apply text-blue-800
      }

      a {
        @apply border-b-1 
      }

    }
  </style>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <title>Galletitas de la Suerte</title>
</head>

<body class="container w-4/5 mx-auto bg-cyan-900">
  

  <p><button type="button" id="boton-mensaje" onclick="mostrarMensaje()"><kbd>click</kbd> para ver el mensaje</button>

  </p>

  <script src="./js/app.js"></script>
</body>

</html>
