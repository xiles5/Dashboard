<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4.1</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
    @import "tailwindcss"; 
    /* Esto carga todo el framework */

    /* Variables de configuración */
    @theme {
      --font-sans: "Inclusive Sans", ui-sans-serif, system-ui, sans-serif;
      --color-brand: #ff4500;
    }

    /* layer base: estilos globales y "reseteo" de etiquetas HTML puras */
    /* Permite definir cómo se ve la web "por defecto" antes de empezar a poner clases. */

    @layer base {
      /* Agregar estilo de párrafo para todo el documento */
     
      
       button{
@apply border bg-blue-500 text-white p-3 mt-4;

    }
  input{
@apply border;

    }
      body{
       
@apply mx-auto w-6/12 text-center bg-cyan-900 mt-40 text-white;

    }
    }
   
    /* @layer components: Se usa para crear clases complejas reutilizables */
    /* Se usa cuando se está repitiendo EXACTAMENTE las mismas 10 clases en muchos componentes (por ejemplo botones), para crear una clase propia. */

    @layer components {
      .btn-principal {
        @apply px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition;
      }
    }

    /* @layer utilities: 
    Es la capa de clases de un solo propósito y máxima prioridad, incluso por encima de lo que diga la capa base o de componentes. */

    @layer utilities {
      .rotate-45-extra {
        transform: rotate(45deg);
      }
    }

  </style>
</head>

<body class="mx-auto w-6/12 text-center bg-cyan-900 mt-40 text-white">
    
     <div class="bg-black p-10 rounded-3xl">
    <p>
        <label for="uno">numero uno</label>
        <input class="border" type="number" id="uno">
        
    </p>
    <p>
        <label for="dos">numero dos</label>
        <input class="border" type="number"  id="dos">
        
    </p>
    <button class="border bg-blue-500 text-white p-3 mt-4" type="button" onclick="mayor()">mayor</button>
    <p id="resultado"></p>
    </div>
<script>
const UNO = document.getElementById("uno");
const DOS = document.getElementById("dos");
const RESU = document.getElementById("resultado");

function mayor(){
    let unos = parseInt(UNO.value);
    let doss = parseInt(DOS.value);
    if(unos > doss ){

RESU.innerHTML = unos + ` es mayor `;
    }else{
      RESU.innerHTML = doss + ` es mayor `;  
    }
}
</script>

</body>
</html>
