<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4.6</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
    @import "tailwindcss"; 
    /* Esto carga todo el framework */

    /* Variables de configuración */
    @theme {
      --font-sans: "Inclusive Sans", ui-sans-serif, system-ui, sans-serif;
      --color-brand: #ff4500;
    }

    /* layer base: estilos globales y "reseteo" de etiquetas HTML puras */
    /* Permite definir cómo se ve la web "por defecto" antes de empezar a poner clases. */

    @layer base {
  button {
    @apply border bg-blue-500 text-white p-3 mt-4 rounded-lg w-full sm:w-auto;
  }

  input {
    @apply border;
  }

  body {
    @apply bg-cyan-900 text-white flex justify-center items-center min-h-screen px-4;
  }

  body > div {
    @apply bg-black p-6 sm:p-10 rounded-3xl w-full max-w-md sm:max-w-2xl;
  }

  select {
    @apply text-black border bg-white w-full sm:w-auto mb-4;
  }

  label {
    @apply mr-4 text-sm sm:text-base;
  }

  p {
    @apply mt-4 text-sm sm:text-lg;
  }
}
  </style>
</head>
<body><div class="bg-black p-10 rounded-3xl">
    <select class="text-black border bg-white" name="comer" id="comidas">
   <option value="1" >Carne</option>
    <option value="2" >Pasta</option>
    <option value="3" >Risotto</option>

</select> 
<input type="checkbox" id="vega">
<label for="vega">Vegano</label>
<input type="checkbox" id="into">
<label for="into">Intolerante a la lactosa</label>
<input type="checkbox" id="into2">
<label for="into2">Intolerante al gluten</label>

<button type="button" onclick="resultado()">resultado</button>

<p id="resultado"></p></div>
<script>
const VEGA = document.getElementById("vega");
const INTO = document.getElementById("into");
const INTO2 = document.getElementById("into2");
const COMIDAS = document.getElementById("comidas");
const RESULTADO = document.getElementById("resultado");

function resultado() {
    let comer = parseInt(COMIDAS.value);

 if(VEGA.checked && comer === 1 || INTO.checked && comer === 2 || INTO2.checked && comer === 3) {
RESULTADO.innerHTML =  `Usted no puede comer este plato. `;
 }else{
  RESULTADO.innerHTML =  `Perfecto, pedido correcto.     `;  
 }

}
</script>



</body>
</html>
