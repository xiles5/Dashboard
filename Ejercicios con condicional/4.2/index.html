<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4.2</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
    @import "tailwindcss"; 
    /* Esto carga todo el framework */

    /* Variables de configuración */
    @theme {
      --font-sans: "Inclusive Sans", ui-sans-serif, system-ui, sans-serif;
      --color-brand: #ff4500;
    }

    /* layer base: estilos globales y "reseteo" de etiquetas HTML puras */
    /* Permite definir cómo se ve la web "por defecto" antes de empezar a poner clases. */

    @layer base {
      /* Agregar estilo de párrafo para todo el documento */
     
      
       button{
@apply border bg-blue-500 text-white p-3 mt-4;

    }
  input{
@apply border;

    }
      body{
       
@apply mx-auto w-6/12 text-center bg-cyan-900 mt-40 text-white;

    }
    }
   
    /* @layer components: Se usa para crear clases complejas reutilizables */
    /* Se usa cuando se está repitiendo EXACTAMENTE las mismas 10 clases en muchos componentes (por ejemplo botones), para crear una clase propia. */

    @layer components {
      .btn-principal {
        @apply px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition;
      }
    }

    /* @layer utilities: 
    Es la capa de clases de un solo propósito y máxima prioridad, incluso por encima de lo que diga la capa base o de componentes. */

    @layer utilities {
      .rotate-45-extra {
        transform: rotate(45deg);
      }
    }

  </style>
</head>
<body> <div class="bg-black p-10 rounded-3xl">
    <p>
        <label for="nomb">Nombre </label>
        <input type="text" name="" id="nomb">
    </p>
    <p>
        <label for="exp" >Experiencia en años: </label>
        <input type="number"  id="exp">
    </p>
    <button type="button" onclick="resultado()">resultado</button>
    <p id="resu"></p>
</div>
    <script>
        const NOMBRE = document.getElementById("nomb");
        const EXP = document.getElementById("exp");
        const RESU = document.getElementById("resu");

        function resultado(){
              let nombre = NOMBRE.value;
                let expe = parseInt(EXP.value);
             if(expe <= 2 ){
RESU.innerHTML = `Nivel principiante.`;

             }  
          else if(expe > 2 && expe <= 4){
RESU.innerHTML = `Nivel intermedio`;
           }
    else if(expe > 4    && expe <= 7){
RESU.innerHTML = ` Nivel avanzado.`;
           }
    else if(expe > 7 && expe <= 10){
RESU.innerHTML = ` Nivel experto.`;
           }
if(expe > 10){
RESU.innerHTML = ` Nivel Gurú.`;
           }
        }
        

    </script>
</body>
</html>
