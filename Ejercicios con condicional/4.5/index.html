<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4.5</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
    @import "tailwindcss"; 
    /* Esto carga todo el framework */

    /* Variables de configuración */
    @theme {
      --font-sans: "Inclusive Sans", ui-sans-serif, system-ui, sans-serif;
      --color-brand: #ff4500;
    }

    /* layer base: estilos globales y "reseteo" de etiquetas HTML puras */
    /* Permite definir cómo se ve la web "por defecto" antes de empezar a poner clases. */

    @layer base {
      /* Agregar estilo de párrafo para todo el documento */
     
      
       button{
@apply border bg-blue-500 text-white p-3 mt-4;

    }
  input{
@apply border;

    }
      body{
       
@apply mx-auto w-6/12 text-center bg-cyan-900 mt-40 text-white;

    }
    }
   
    /* @layer components: Se usa para crear clases complejas reutilizables */
    /* Se usa cuando se está repitiendo EXACTAMENTE las mismas 10 clases en muchos componentes (por ejemplo botones), para crear una clase propia. */

    @layer components {
      .btn-principal {
        @apply px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition;
      }
    }

    /* @layer utilities: 
    Es la capa de clases de un solo propósito y máxima prioridad, incluso por encima de lo que diga la capa base o de componentes. */

    @layer utilities {
      .rotate-45-extra {
        transform: rotate(45deg);
      }
    }

  </style>
</head>
<body><div class="bg-black p-10 rounded-3xl">
   <form >  
<input type="number" id="numero1"  >

<input type="number" id="numero2"  >

<select class="bg-blue-600" name="calculadora" id="calcula">
   <option value="1" >suma</option>
    <option value="2" >resta</option>
    <option value="3" >multiplicacion</option>
    <option value="4">division</option>
</select> 
</form>
 
<button type="button" onclick="resultado()">calcular</button>
<p id="parrafo"></p>
</div>
<script>

const NUMERO1 = document.getElementById("numero1");
const NUMERO2 = document.getElementById("numero2");
const CALCULA = document.getElementById("calcula");

const PARRAFO = document.getElementById("parrafo");


function resultado(){
    let sumar =Number(NUMERO1.value);
let sumar2 = Number(NUMERO1.value);
let calculador = Number(CALCULA.value);


 if( calculador === 1){
  PARRAFO.innerHTML = sumar + sumar2;

 }
 
 if( calculador === 2){
  PARRAFO.innerHTML = sumar - sumar2;

 }
 
 if( calculador === 3){
  PARRAFO.innerHTML = sumar * sumar2;

 }
 
 if( calculador === 4){
  PARRAFO.innerHTML = sumar / sumar2;

 }

}


</script>

</body>
</html>
