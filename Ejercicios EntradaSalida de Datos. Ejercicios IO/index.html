<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
 <style type="text/tailwindcss">
@import "tailwindcss";

@theme {
  --font-sans: "Inclusive Sans", ui-sans-serif, system-ui, sans-serif;
  --color-brand: #ff4500;
}

@layer base {

  body{
    @apply min-h-screen bg-cyan-900
    text-white flex justify-center
    items-start md:items-center
    p-4;
  }

  button{
    @apply border bg-blue-500 hover:bg-blue-600
    text-white px-5 py-3 mt-4
    rounded-xl transition w-full md:w-auto;
  }

  input{
    @apply border border-white rounded-lg p-2
    text-white w-full mt-2;
  }

  p{
    @apply mb-4 text-sm md:text-base;
  }

  h1{
    @apply text-2xl md:text-4xl
    font-bold mb-6 mt-8;
  }

  label{
    @apply block mb-2;
  }

}

@layer components {

  .contenedor{
    @apply bg-black w-full max-w-3xl
    p-6 md:p-10 rounded-3xl
    shadow-2xl;
  }

}

@layer utilities {

  .rotate-45-extra {
    transform: rotate(45deg);
  }

}
</style>
</head>
<body ><div class="contenedor">
    
    <h1>formulario</h1>
    <p>  <label for="numerouno">escribe un numero entero</label>
         <input type="number"  id="numerouno">
        </p> 
    <p><label for="numerodos">escribe otro numero entero</label> 
        <input type="number"  id="numerodos">
    </p>
    <button type="button" onclick="resultado()">resultado</button>
    <p id="suma"></p>
    

<h1>Promedio</h1>
<p><label for="numeuno">introduce un numero</label>
    <input type="number" id="numeuno">
</p>
<p><label for="numedos">introduce un segundo numero</label>
    <input type="number" id="numedos">
</p>
<p><label for="numetres">introduce un tercer numero</label>
    <input type="number" id="numetres">
</p>
<p><button type="button" onclick="promedio()">promedio</button></p>
<p id="resultado"></p>
<h1>Multiplicacion </h1>
<p><label for="number1">introduce un numero</label>
    <input type="number" id="number1">
</p>
<p><button type="button" onclick="multiplicacion()">Multiplica</button></p>
<p id="multipli"></p>
<h1>Pintura </h1>
<p><label for="number1.1">introduce el alto</label>
    <input type="number" id="number1.1">
</p>
<p><label for="number1.2">introduce el ancho</label>
    <input type="number" id="number1.2">
</p>
<p><label for="number1.3">Manos de pintura a aplicar</label>
    <input type="number" id="number1.3">
</p>
<p><button type="button" onclick="pintura()">litro a usar</button></p>
<p id="respintura"></p>
</div>
<script src="app.js"></script>
</body>
</html>
