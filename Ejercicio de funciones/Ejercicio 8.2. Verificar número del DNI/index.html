        <div class="bg-black text-white p-30 rounded-md">

      <button type="button" class="m-4" onclick="resuelto()">RESULTADO</button>
    
<div class="resultado-box">
<p id="resultado"></p>
</div>
<script>
NUMERO1 = document.getElementById("numero1");
RESULTADO = document.getElementById("resultado");

function resuelto(){
    const posicion= "TRWAGMYFPDXBNJZSQVHLCKE";
let dni = NUMERO1.value;
 let letraDni =   toupperCase(dni.slice(8,8));
let numeroDni =  parseInt( dni.slice(0,7));
let modulo = numeroDni % 23;
if (letraDni === posicion[modulo]){

RESULTADO.innerHTML = "Tu dni es correcto";

}else{
    RESULTADO.innerHTML = "Tu dni es incorrecto";
}
}





</script>
