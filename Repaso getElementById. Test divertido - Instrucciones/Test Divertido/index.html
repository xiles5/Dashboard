<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test divertido</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
</head>
<body class="w-4/12 mx-auto bg-cyan-900 text-white">

    <h1 class="text-2xl font-bold text-center mb-4">Test Divertido</h1>

   
    <h2 id="titulo1" class="font-bold mt-4">Ordena estos animales en orden de preferencia:</h2>

    <p class="flex justify-between p-2">
        <label id="vaquita" for="vaca">Vaca:</label>
        <input class="border rounded-sm w-20" type="number" id="vaca" min="1" max="5">
    </p>

    <p class="flex justify-between p-2">
        <label id="tigrecito" for="tigre">Tigre:</label>
        <input class="border rounded-sm w-20" type="number" id="tigre" min="1" max="5">
    </p>

    <p class="flex justify-between p-2">
        <label id="obejita" for="obeja">Oveja:</label>
        <input class="border rounded-sm w-20" type="number" id="obeja" min="1" max="5">
    </p>

    <p class="flex justify-between p-2">
        <label id="caballito" for="caballo">Caballo:</label>
        <input class="border rounded-sm w-20" type="number" id="caballo" min="1" max="5">
    </p>

    <p class="flex justify-between p-2">
        <label id="monito" for="mono">Mono:</label>
        <input class="border rounded-sm w-20" type="number" id="mono" min="1" max="5">
    </p>

   
    <h2 id="titulo2" class="font-bold mt-6">Escribe una palabra que describa lo siguiente:</h2>

    <p class="flex justify-between p-2">
        <label id="perrito" for="Perro">Perro:</label>
        <input class="border rounded-sm w-40" type="text"   id="Perro">
    </p>

    <p class="flex justify-between p-2">
        <label id="gatito" for="Gato">Gato:</label>
        <input class="border rounded-sm w-40" type="text"  id="Gato">
    </p>

    <p class="flex justify-between p-2">
        <label id="ratita" for="Rata">Rata:</label>
        <input class="border rounded-sm w-40" type="text"   id="Rata">
    </p>

    <p class="flex justify-between p-2">
        <label id="cafecito" for="Cafe">Café:</label>
        <input class="border rounded-sm w-40" type="text"   id="Cafe">
    </p>

    <p class="flex justify-between p-2">
        <label id="marcito" for="Mar">Mar:</label>
        <input class="border rounded-sm w-40" type="text"   id="Mar">
    </p>

  
    <h2 id="titulo3" class="font-bold mt-6">Indica alguien importante para ti según el color:</h2>

    <p class="flex justify-between p-2">
        <label id="amarillito" for="Amarillo">Amarillo:</label>
        <input class="border rounded-sm w-40" type="text" id="Amarillo">
    </p>

    <p class="flex justify-between p-2">
        <label id="naranjita" for="Naranja">Naranja:</label>
        <input class="border rounded-sm w-40" type="text" id="Naranja">
    </p>

    <p class="flex justify-between p-2">
        <label id="blanquito" for="Blanco">Blanco:</label>
        <input class="border rounded-sm w-40" type="text" id="Blanco">
    </p>

    <p class="flex justify-between p-2">
        <label id="rojito" for="Rojo">Rojo:</label>
        <input class="border rounded-sm w-40" type="text" id="Rojo">
    </p>

    <p class="flex justify-between p-2">
        <label id="verdecito" for="Verde">Verde:</label>
        <input class="border rounded-sm w-40" type="text" id="Verde">
    </p>

  
    <button class="border mt-4 p-2 bg-blue-500 text-white" type="button" onclick="resultado()">
        Resultado
    </button>

    <script src="javascript.js"></script>
</body>
</html>
